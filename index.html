<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weekify</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4310805868565928" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { borderRadius: { '4xl': '2rem' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .not-italic { font-style: normal !important; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-900 dark:text-zinc-100 transition-colors duration-200 min-h-screen">

    <div id="main-screen" class="max-w-md mx-auto px-6 pt-10 space-y-6">
        <header class="flex justify-between items-start mb-8">
            <div class="not-italic">
                <h1 class="text-4xl font-black tracking-tighter uppercase dark:text-white text-black">Weekify</h1>
                <p class="text-indigo-500 font-bold text-xs uppercase tracking-widest mt-1">Status</p>
            </div>
            <button id="themeToggle" class="p-3 rounded-2xl bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 shadow-sm"><span id="themeIcon">☀️</span></button>
        </header>
        
        <div onclick="showScreen('week')" class="card bg-white dark:bg-zinc-900 p-8 rounded-4xl border border-slate-200 dark:border-zinc-800 cursor-pointer text-center relative overflow-hidden shadow-sm active:scale-95 transition-transform">
            <p class="text-xs uppercase tracking-[0.2em] text-indigo-500 font-bold mb-4 not-italic">Week</p>
            <div class="flex items-baseline justify-center gap-2 not-italic">
                <p id="week-number" class="text-8xl font-black tracking-tighter">--</p>
                <p class="text-2xl text-slate-400 dark:text-zinc-600 font-light">/ 52</p>
            </div>
        </div>

        <div onclick="showScreen('day')" class="card bg-white dark:bg-zinc-900 p-8 rounded-4xl border border-slate-200 dark:border-zinc-800 cursor-pointer text-center relative overflow-hidden shadow-sm active:scale-95 transition-transform">
            <p class="text-xs uppercase tracking-[0.2em] text-emerald-500 font-bold mb-4 not-italic">Day</p>
            <div class="flex items-baseline justify-center gap-2 not-italic">
                <p id="day-number" class="text-8xl font-black tracking-tighter">--</p>
                <p id="total-days-label" class="text-2xl text-slate-400 dark:text-zinc-600 font-light">/ 365</p>
            </div>
        </div>

        <div class="p-2 border border-dashed border-slate-300 dark:border-zinc-800 rounded-3xl overflow-hidden bg-white/50 dark:bg-zinc-950/50 min-h-[100px]">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4310805868565928" data-ad-slot="8294367144" data-ad-format="auto" data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <footer class="mt-8 pb-6 text-center">
            <button onclick="document.getElementById('privacy-modal').classList.remove('hidden')" class="text-[10px] text-slate-400 dark:text-zinc-700 uppercase tracking-widest font-bold">Privacy Policy</button>
        </footer>
    </div>

    <div id="scroll-view" class="max-w-md mx-auto px-4 pt-8 pb-10 hidden">
        <div class="flex justify-between items-center mb-6">
            <button onclick="showScreen('main')" class="py-3 px-6 bg-white dark:bg-zinc-900 rounded-2xl text-sm font-bold border border-slate-200 dark:border-zinc-800 dark:text-white">← Back</button>
            <button id="todayBtn" class="py-3 px-6 bg-indigo-600 text-white rounded-2xl text-sm font-bold">Today</button>
        </div>
        <div class="bg-white dark:bg-zinc-900 rounded-4xl border border-slate-200 dark:border-zinc-800 overflow-hidden shadow-xl">
            <div class="p-6 border-b border-slate-100 dark:border-zinc-800 bg-slate-50 dark:bg-zinc-800/30">
                <h2 id="view-title" class="text-xl font-black uppercase tracking-tight not-italic dark:text-white">Archive</h2>
            </div>
            <div id="list-container" class="max-h-[70vh] overflow-y-auto no-scrollbar scroll-auto"></div>
        </div>
    </div>

    <div id="privacy-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="this.parentElement.classList.add('hidden')"></div>
        <div class="relative bg-white dark:bg-zinc-900 border border-slate-200 dark:border-zinc-800 p-8 rounded-4xl max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-black mb-4 uppercase not-italic dark:text-white text-black">Privacy Policy</h3>
            <div class="text-xs text-slate-500 dark:text-zinc-400 leading-relaxed not-italic space-y-3">
                <p>This app uses Google AdSense to display ads. Google may use cookies to serve ads based on your visits.</p>
                <p>No personal data is stored directly by Weekify.</p>
            </div>
            <button onclick="this.closest('#privacy-modal').classList.add('hidden')" class="mt-8 w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs">Close</button>
        </div>
    </div>

    <script>
        const now = new Date();
        const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        
        function getWK(d) {
            const dt = new Date(d.getTime());
            dt.setHours(0,0,0,0); dt.setDate(dt.getDate() + 3 - (dt.getDay() + 6) % 7);
            const w1 = new Date(dt.getFullYear(), 0, 4);
            return 1 + Math.round(((dt.getTime() - w1.getTime()) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
        }

        const isL = (y) => (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
        document.getElementById('week-number').innerText = getWK(now);
        document.getElementById('day-number').innerText = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
        document.getElementById('total-days-label').innerText = `/ ${isL(now.getFullYear()) ? 366 : 365}`;

        function showScreen(mode) {
            const main = document.getElementById('main-screen');
            const scroll = document.getElementById('scroll-view');
            const container = document.getElementById('list-container');
            
            if (mode === 'main') {
                main.classList.remove('hidden'); scroll.classList.add('hidden');
            } else {
                main.classList.add('hidden'); scroll.classList.remove('hidden');
                container.innerHTML = ''; // ČIŠTĚNÍ
                render(mode);
                const active = document.getElementById('active-item');
                if (active) active.scrollIntoView({ block: 'center' });
                
                document.getElementById('todayBtn').onclick = () => {
                    container.style.scrollBehavior = 'smooth';
                    active.scrollIntoView({ block: 'center' });
                    setTimeout(() => container.style.scrollBehavior = 'auto', 1000);
                };
            }
        }

        function render(mode) {
            const container = document.getElementById('list-container');
            let h = '';
            if (mode === 'week') {
                document.getElementById('view-title').innerText = 'Week Archive';
                for (let y = 2024; y <= 2027; y++) {
                    for (let m = 0; m < 12; m++) {
                        h += `<div class="p-4 pt-8 text-center font-black text-sm uppercase tracking-widest text-slate-400 dark:text-zinc-600 border-t border-slate-100 dark:border-zinc-800">${months[m]} ${y}</div><div class="grid grid-cols-8 gap-1 p-4 text-[9px] font-black text-center opacity-40 dark:text-white"><div>MO</div><div>TU</div><div>WE</div><div>TH</div><div>FR</div><div>SA</div><div>SU</div><div class="text-indigo-500">WK</div></div><div class="grid grid-cols-8 gap-x-1 gap-y-2 p-4 pt-0 text-center text-xs">`;
                        let f = new Date(y, m, 1), off = f.getDay() === 0 ? 6 : f.getDay() - 1, l = new Date(y, m + 1, 0);
                        for (let i = off - 1; i >= 0; i--) h += `<div class="py-2 opacity-10 dark:text-white">${new Date(y, m, -i).getDate()}</div>`;
                        for (let d = 1; d <= l.getDate(); d++) {
                            let c = new Date(y, m, d), isT = c.toDateString() === now.toDateString();
                            h += `<div id="${isT ? 'active-item' : ''}" class="py-2 flex items-center justify-center ${isT ? 'bg-indigo-600 text-white rounded-xl font-bold' : 'dark:text-zinc-300 text-slate-600'}">${d}</div>`;
                            if (c.getDay() === 0 || d === l.getDate()) {
                                if (d === l.getDate()) {
                                    let fill = 7 - (c.getDay() === 0 ? 7 : c.getDay());
                                    for(let f=1; f<=fill; f++) h += `<div class="py-2 opacity-10 dark:text-white">${f}</div>`;
                                }
                                h += `<div class="py-2 bg-slate-100 dark:bg-zinc-800/40 text-indigo-500 font-bold rounded-xl flex items-center justify-center">${getWK(c)}</div>`;
                            }
                        }
                        h += `</div>`;
                    }
                }
            } else {
                document.getElementById('view-title').innerText = 'Day Archive';
                for (let y = 2024; y <= 2027; y++) {
                    const days = isL(y) ? 366 : 365;
                    for (let i = 1; i <= days; i++) {
                        let d = new Date(y, 0, i), isT = d.toDateString() === now.toDateString();
                        h += `<div id="${isT ? 'active-item' : ''}" class="flex items-center justify-between p-5 border-b border-slate-50 dark:border-zinc-800/50 ${isT ? 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-500 font-bold border-l-4 border-emerald-500' : 'text-slate-400 dark:text-zinc-500'}"><div class="flex items-center gap-4"><span class="text-[10px] font-mono opacity-40">#${i}</span><span class="text-[10px] font-bold opacity-30 uppercase">${y}</span></div><div class="text-right uppercase tracking-tight font-bold text-xs">${d.getDate().toString().padStart(2, '0')} ${months[d.getMonth()]} ${y}</div></div>`;
                    }
                }
            }
            container.innerHTML = h;
        }

        document.getElementById('themeToggle').onclick = () => {
            const isD = document.documentElement.classList.toggle('dark');
            document.getElementById('themeIcon').innerText = isD ? '☀️' : '🌙';
        };
    </script>
</body>
</html>
